services:
  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    ports:
      - "${MLFLOW_PORT:-5000}:5000"
    volumes:
      - mlflow_data:/mlruns
    command: mlflow server --backend-store-uri sqlite:////mlruns/mlflow.db --host 0.0.0.0 --port 5000 --allowed-hosts '*'

  data:
    build:
      context: .
      dockerfile: docker/Dockerfile.data
    image: ghcr.io/${GITHUB_REPOSITORY:-zameloth/orchestration_ml}/mlproject-data:latest
    profiles: [data]
    volumes:
      - ./data:/data
    environment:
      KAGGLE_TKN: ${KAGGLE_TKN}

  train:
    build:
      context: .
      dockerfile: docker/Dockerfile.train
    image: ghcr.io/${GITHUB_REPOSITORY:-zameloth/orchestration_ml}/mlproject-train:latest
    profiles: [train]
    volumes:
      - models_data:/app/models
      - ./data:/app/data
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
    depends_on:
      - mlflow

  api:
    image: ghcr.io/zameloth/orchestration_ml/mlproject-api:latest
    ports:
      - "${API_PORT:-8000}:8000"
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    depends_on:
      - mlflow

  frontend:
    image: ghcr.io/zameloth/orchestration_ml/mlproject-frontend:latest
    ports:
      - "${FRONTEND_PORT:-8501}:8501"
    environment:
      API_URL: http://api:8000
      MLFLOW_URL: http://localhost:${MLFLOW_PORT:-5000}
      API_DOCS_URL: http://localhost:${API_PORT:-8000}/docs
    depends_on:
      api:
        condition: service_healthy

volumes:
  mlflow_data:
  models_data:
