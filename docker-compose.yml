services:
  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    ports:
      - "${MLFLOW_PORT:-5000}:5000"
    volumes:
      - mlflow_data:/mlruns
    command: mlflow server --backend-store-uri sqlite:////mlruns/mlflow.db --host 0.0.0.0 --port 5000

  train:
    build:
      context: .
      dockerfile: docker/Dockerfile.train
    profiles: [train]
    volumes:
      - models_data:/app/models
      - ./data:/app/data
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
    depends_on:
      - mlflow

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - models_data:/app/models:ro
    environment:
      MODEL_PATH: /app/models/best_model.joblib
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    depends_on:
      - mlflow

volumes:
  mlflow_data:
  models_data:
